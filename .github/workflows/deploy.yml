name: Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: gcr.io
  BACKEND_IMAGE: gcr.io/${{ vars.GCP_PROJECT_ID }}/ms365-migration-backend
  FRONTEND_IMAGE: gcr.io/${{ vars.GCP_PROJECT_ID }}/ms365-migration-frontend

jobs:
  # ── Build & push Docker images ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.repository != ''

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.version }}
      frontend_tag: ${{ steps.meta-frontend.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=git-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend
      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=git-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Cloud Run ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ms365-migration-backend
          image: ${{ env.BACKEND_IMAGE }}:git-${{ github.sha }}
          region: ${{ vars.GCP_REGION || 'us-central1' }}
          flags: >
            --min-instances=1
            --max-instances=10
            --memory=2Gi
            --cpu=2
            --timeout=3600
            --concurrency=80
            --set-env-vars=ENVIRONMENT=production
            --set-env-vars=ENGINE_USE_SECRET_MANAGER=true
            --set-env-vars=GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ms365-migration-frontend
          image: ${{ env.FRONTEND_IMAGE }}:git-${{ github.sha }}
          region: ${{ vars.GCP_REGION || 'us-central1' }}
          flags: >
            --min-instances=0
            --max-instances=3
            --memory=256Mi
            --cpu=1

      - name: Show service URLs
        run: |
          echo "Backend: $(gcloud run services describe ms365-migration-backend --region=${{ vars.GCP_REGION || 'us-central1' }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe ms365-migration-frontend --region=${{ vars.GCP_REGION || 'us-central1' }} --format='value(status.url)')"
