name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Python backend — lint ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install --quiet ruff

      - name: Ruff lint (report only)
        run: ruff check . || true

      - name: Ruff format check (report only)
        run: ruff format --check . || true

  # ── Python backend — tests ──────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      ENVIRONMENT: development
      GCP_PROJECT_ID: migration-test-local
      GCP_GCS_BUCKET: migration-test-bucket
      MS365_TENANT_ID: 00000000-0000-0000-0000-000000000000
      MS365_CLIENT_ID: 00000000-0000-0000-0000-000000000001
      MS365_CLIENT_SECRET: test-secret
      ENGINE_USE_SECRET_MANAGER: "false"
      GOOGLE_CLOUD_PROJECT: migration-test-local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install --quiet -r requirements-ci.txt

      - name: Run tests
        run: pytest tests/test_api.py -v --tb=short --no-header -p no:warnings --override-ini="addopts="

  # ── Frontend — build ────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --silent

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

  # ── Docker build smoke-test ─────────────────────────────────────────────
  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ms365-migration-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
