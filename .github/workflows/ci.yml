name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Python backend ──────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install ruff mypy pydantic pydantic-settings

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      ENVIRONMENT: development
      GCP_PROJECT_ID: migration-test-local
      GCP_GCS_BUCKET: migration-test-bucket
      MS365_TENANT_ID: 00000000-0000-0000-0000-000000000000
      MS365_CLIENT_ID: 00000000-0000-0000-0000-000000000001
      MS365_CLIENT_SECRET: test-secret
      ENGINE_USE_SECRET_MANAGER: "false"
      FIRESTORE_EMULATOR_HOST: localhost:8080
      PUBSUB_EMULATOR_HOST: localhost:8085
      STORAGE_EMULATOR_HOST: http://localhost:4443
      GOOGLE_CLOUD_PROJECT: migration-test-local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --no-header
        continue-on-error: true

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npm run type-check
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

  # ── Docker build smoke-test ─────────────────────────────────────────────
  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ms365-migration-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
