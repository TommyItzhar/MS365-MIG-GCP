name: CI/CD Pipeline

on:
  push:
    branches: [dev, test, prod]
  pull_request:
    branches: [dev, test, prod]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migration_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run pytest
        working-directory: backend
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://postgres:postgres@localhost/migration_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
          MS365_TENANT_ID: ci-test
          MS365_CLIENT_ID: ci-test
          MS365_CLIENT_SECRET: ci-test
          GOOGLE_DOMAIN: ci-test.local
        run: pytest tests/ --cov=app --cov-report=xml -v

  test-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Build
        working-directory: frontend
        run: npm run build

  build-and-push:
    name: Build & push images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.ref_name }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.ref_name }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to dev
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Bump dev image tag in Kustomize overlay
        run: |
          cd infrastructure/k8s/overlays/dev
          # ArgoCD will pick up the change and sync automatically
          sed -i "s|newTag:.*|newTag: dev-${{ github.sha }}|g" kustomization.yaml
          git config user.email "ci@itzhar-olivera.com"
          git config user.name "CI Bot"
          git add . && git commit -m "ci(dev): deploy ${{ github.sha }}" && git push

  deploy-test:
    name: Deploy to test
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Bump test image tag
        run: |
          cd infrastructure/k8s/overlays/test
          sed -i "s|newTag:.*|newTag: test-${{ github.sha }}|g" kustomization.yaml
          git config user.email "ci@itzhar-olivera.com"
          git config user.name "CI Bot"
          git add . && git commit -m "ci(test): deploy ${{ github.sha }}" && git push

  deploy-prod:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod'
    environment: production   # requires manual approval — set up in GitHub Environments
    steps:
      - uses: actions/checkout@v4
      - name: Bump prod image tag
        run: |
          cd infrastructure/k8s/overlays/prod
          sed -i "s|newTag:.*|newTag: prod-${{ github.sha }}|g" kustomization.yaml
          git config user.email "ci@itzhar-olivera.com"
          git config user.name "CI Bot"
          git add . && git commit -m "ci(prod): promote ${{ github.sha }}" && git push
      - name: Notify
        run: echo "Prod manifest updated. ArgoCD prod app requires manual sync."
