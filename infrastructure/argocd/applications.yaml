---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: migration-platform-prod
  namespace: argocd
  labels: { environment: prod }
spec:
  project: default
  source:
    repoURL: https://github.com/itzhar-olivera/ms365-gcp-migration
    targetRevision: prod
    path: infrastructure/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: migration-prod
  syncPolicy:
    automated: { prune: false, selfHeal: false }   # prod requires manual sync
    syncOptions: [CreateNamespace=true]
  revisionHistoryLimit: 10
