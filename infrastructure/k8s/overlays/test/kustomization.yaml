apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: migration-test

resources:
  - ../../base

namePrefix: test-
commonLabels:
  environment: test

images:
  - name: backend
    newName: ghcr.io/itzhar-olivera/ms365-gcp-migration/backend
    newTag: test-latest
  - name: frontend
    newName: ghcr.io/itzhar-olivera/ms365-gcp-migration/frontend
    newTag: test-latest

replicas:
  - name: backend
    count: 2
  - name: worker
    count: 2
  - name: frontend
    count: 2

patches:
  - target:
      kind: ConfigMap
      name: migration-config
    patch: |-
      - op: replace
        path: /data/CORS_ORIGINS
        value: "https://migration-test.itzhar-olivera.com"
  - target:
      kind: Ingress
      name: migration-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: migration-test.itzhar-olivera.com
      - op: replace
        path: /spec/rules/0/host
        value: migration-test.itzhar-olivera.com
